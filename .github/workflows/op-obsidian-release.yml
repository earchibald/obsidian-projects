name: Release op-obsidian

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: op-obsidian-release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Read manifest version
        id: version
        run: |
          version=$(jq -r .version plugins/op-obsidian/manifest.json)
          if [[ -z "$version" || "$version" == "null" ]]; then
            echo "ERROR: could not read a valid version from plugins/op-obsidian/manifest.json" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=op-obsidian-v$version" >> "$GITHUB_OUTPUT"

      - name: Skip if tag already exists
        id: guard
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          if git rev-parse --verify --quiet "refs/tags/$TAG" >/dev/null; then
            echo "Tag $TAG already exists; nothing to release."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        if: steps.guard.outputs.skip == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install
        if: steps.guard.outputs.skip == 'false'
        working-directory: plugins/op-obsidian
        run: |
          if ! npm ci; then
            {
              echo "## ❌ \`npm ci\` failed — lockfile out of sync"
              echo ""
              echo "**Likely cause:** \`plugins/op-obsidian/package.json\` was edited without"
              echo "regenerating \`package-lock.json\`."
              echo ""
              echo "**Fix:** run \`npm install\` in \`plugins/op-obsidian/\` and commit the"
              echo "updated \`package-lock.json\` before merging."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

      - name: Build
        if: steps.guard.outputs.skip == 'false'
        working-directory: plugins/op-obsidian
        run: npm run build

      - name: Prepare release bundle
        if: steps.guard.outputs.skip == 'false'
        run: node scripts/prepare-op-obsidian-release.mjs

      - name: Create and push tag
        if: steps.guard.outputs.skip == 'false'
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"

      - name: Create release
        if: steps.guard.outputs.skip == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          gh release create "$TAG" \
            --title "op-obsidian v$VERSION" \
            --generate-notes \
            plugins/op-obsidian/main.js \
            plugins/op-obsidian/manifest.json \
            plugins/op-obsidian/styles.css \
            plugins/op-obsidian/.release/op-obsidian.zip
